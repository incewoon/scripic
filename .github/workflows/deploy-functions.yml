name: Deploy Firebase Functions
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Functions Dependencies
        working-directory: functions
        run: bun install

      - name: Build Functions
        working-directory: functions
        run: bun run build

      - name: Install Firebase CLI (latest)
        run: npm install -g firebase-tools

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > ${{ runner.temp }}/gcp-key.json

      - name: Deploy to Firebase Functions
        working-directory: functions
        run: firebase deploy --only functions --project ai-album-app --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-key.json
