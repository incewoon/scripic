name: Deploy Firebase Functions

on:
  # functions 폴더 내부의 코드가 변경되거나, main 브랜치에 푸시될 때 자동 실행
   push:
    branches: [ main ]
    paths:
      - 'functions/**'
  # 필요할 때 수동 실행도 가능
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Functions Dependencies
        working-directory: functions
        run: bun install

      # 1. Firebase 컨테이너 외부(최신 환경)에서 안전하게 미리 빌드(tsc)를 수행합니다.
      - name: Build Functions
        working-directory: functions
        run: bun run build

      # 2. 배포할 때는 Firebase 내부의 중복 predeploy 빌드를 건너뛰도록 옵션을 줍니다.
      - name: Deploy to Firebase Functions
        uses: w9jds/firebase-action@v13.4.0
        with:
          # --force 옵션을 주거나 덮어쓰면 predeploy 에러를 방지할 수 있습니다.
          # 혹은 원래 스크립트 그대로 호출하되 이미 빌드된 파일(lib 폴더)을 올립니다.
          args: deploy --only functions
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
