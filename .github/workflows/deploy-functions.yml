name: Deploy Firebase Functions
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Functions Dependencies
        working-directory: functions
        run: bun install
      - name: Build Functions
        working-directory: functions
        run: bun run build

      # ★ 추가: 배포 패키지에 bun.lock이 섞여서 GCP가 Bun 런타임으로 오판하는 것 방지
      - name: Remove bun lockfile before deploy
        working-directory: functions
        run: rm -f bun.lock bun.lockb

      - name: Install Firebase CLI (latest)
        run: npm install -g firebase-tools
      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > ${{ runner.temp }}/gcp-key.json
      - name: Deploy to Firebase Functions (batch 1)
        working-directory: functions
        run: firebase deploy --only functions:chat,functions:generateAlbum --project ai-album-app --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-key.json

      - name: Wait between batches
        run: sleep 30

      - name: Deploy to Firebase Functions (batch 2)
        working-directory: functions
        run: firebase deploy --only functions:dailyStatus,functions:grantReviewReward,functions:resetDailyAlbumLimit --project ai-album-app --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-key.json

      - name: Wait between batches
        run: sleep 30

      - name: Deploy to Firebase Functions (batch 3)
        working-directory: functions
        run: firebase deploy --only functions:searchPlaces,functions:reverseGeocode,functions:geocodeLocation --project ai-album-app --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-key.json
