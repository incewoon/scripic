name: Build Android AAB (Scripic)

on:
  #자동실행 방지
  #push:
  #  branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Install dependencies & Build web
        run: |
          bun install
          bun run build

          # dist/client에 index.html이 없으면 간단한 shell을 만들어줌 (임시 방편)
    #  - name: Ensure index.html for Capacitor
    #    run: |
    #      if [ ! -f "dist/client/index.html" ]; then
    #        echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Scripic</title></head><body><div id="root"></div><script type="module" src="/assets/index-*.js"></script></body></html>' > dist/client/index.html
    #      fi

      # cap add 없이 cap sync만 실행 (더 안정적)
      - name: Capacitor Sync Android
        run: bunx cap sync android

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Make gradlew executable
        run: chmod +x ./gradlew
        working-directory: android
        
      - name: Build Signed Release AAB
        working-directory: android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scripic-Android-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 14
